<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Invest Navigator — Katalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   TOKENS
============================================================ */
:root {
  --accent: #D9B871;
  --accent-soft: #E8CB8E;
  --accent-deep: #B89150;
  --accent-glow: rgba(217, 184, 113, 0.18);

  --bg-0: #0E1014;
  --bg-1: #15181F;
  --bg-2: #1B1F28;
  --bg-3: #232833;
  --bg-4: #2C313D;
  --line: rgba(255,255,255,0.07);
  --line-2: rgba(255,255,255,0.14);

  --fg-0: #F4F1EA;
  --fg-1: #C8C4BC;
  --fg-2: #8B8780;
  --fg-3: #5C5953;

  --ok:   #6FCF97;
  --warn: #E8C77E;
  --bad:  #E07A7A;

  --font-sans: 'Manrope', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --card-bg: rgba(27, 31, 40, 0.6);
  --card-border: 1px solid rgba(255,255,255,0.06);
  --card-shadow: 0 24px 60px -30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  --card-backdrop: blur(20px) saturate(120%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-0); color: var(--fg-0); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { min-height: 100vh; overflow-x: hidden; font-size: 15px; line-height: 1.5; letter-spacing: -0.005em; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; letter-spacing: inherit; }
input, select, textarea { font: inherit; color: inherit; }
img, svg { display: block; max-width: 100%; }
::selection { background: var(--accent); color: #0B0C0F; }

*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
*::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

.num { font-family: var(--font-mono); font-feature-settings: "tnum" 1; letter-spacing: -0.01em; }

h1, h2, h3, h4 { font-family: var(--font-sans); font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
h1 { font-size: clamp(22px, 2.8vw, 36px); font-weight: 500; letter-spacing: -0.025em; }
h2 { font-size: clamp(22px, 2.4vw, 32px); }
h3 { font-size: clamp(18px, 1.8vw, 22px); }

.eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); font-weight: 500; }
.muted { color: var(--fg-2); }

/* ============================================================
   TOPBAR
============================================================ */
.topbar {
  position: relative;
  z-index: 50;
  display: flex; align-items: center; gap: 16px;
  padding: 16px 32px;
  background: var(--bg-0);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex; align-items: center; gap: 12px;
}
.brand .mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: radial-gradient(circle at 30% 30%, var(--accent-soft), var(--accent-deep));
  position: relative;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 6px 14px -4px var(--accent-glow);
}
.brand .mark::before {
  content: ""; position: absolute; inset: 6px;
  border-radius: 4px;
  background: var(--bg-0);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}
.brand .wordmark {
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.brand .wordmark span { color: var(--accent); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.lang-switch {
  display: flex; align-items: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  border-radius: 99px;
  padding: 3px;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 500;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.lang-switch button {
  padding: 5px 10px;
  border-radius: 99px;
  color: var(--fg-2);
  text-transform: uppercase;
  transition: all 0.15s ease;
}
.lang-switch button[aria-pressed="true"] {
  background: var(--accent);
  color: var(--bg-0);
}

/* ============================================================
   STICKY HEADER AREA
============================================================ */
.sticky-area {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--bg-0);
}
.sticky-area::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -12px;
  height: 12px;
  background: linear-gradient(to bottom, var(--bg-0), rgba(14,16,20,0));
  pointer-events: none;
}
.sticky-area .page-head { padding-top: 32px; padding-bottom: 14px; }
.sticky-area .section.pinned-filters { padding-top: 0; padding-bottom: 6px; }
.live-stats-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 16px;
  margin-top: 10px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--line);
  flex-wrap: wrap;
}
.live-stats-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.nav-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  color: var(--fg-1);
  padding: 0 16px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-title em { font-style: normal; color: var(--accent); }
.nav-title[hidden] { display: none !important; }

.back-link {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--fg-1);
  padding: 8px 14px;
  border-radius: 99px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  font-weight: 500;
  transition: all 0.15s ease;
  margin-bottom: 16px;
}
.back-link:hover { background: rgba(255,255,255,0.08); color: var(--fg-0); border-color: var(--line-2); }
.back-link[hidden] { display: none !important; }
.back-link:not([hidden]) { display: flex; width: fit-content; }

.detail-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.detail-eyebrow[hidden] { display: none !important; }
.detail-eyebrow .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
}

/* ===== Offer cards (deposit + stock) ===== */
.offer-card { display: flex; flex-direction: column; gap: 12px; }
.offer-card .top {
  display: flex; align-items: flex-start; gap: 12px;
  justify-content: space-between;
}
.offer-card .provider {
  display: flex; align-items: center; gap: 10px;
  min-width: 0;
}
.offer-card .pavatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(217,184,113,0.12);
  color: var(--accent);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  font-weight: 600;
  flex-shrink: 0;
  border: 1px solid rgba(217,184,113,0.18);
}
.offer-card .pname {
  font-size: 13px; font-weight: 500; color: var(--fg-1);
  letter-spacing: -0.005em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.offer-card .pcat {
  font-size: 10px;
  color: var(--fg-3);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 2px;
}
.offer-card .oname {
  font-size: 17px; font-weight: 600; letter-spacing: -0.015em;
  line-height: 1.2;
}
.offer-card .rate-strip {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(217,184,113,0.10), rgba(217,184,113,0.02));
  border: 1px solid rgba(217,184,113,0.15);
}
.offer-card .rate-strip .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.offer-card .rate-strip .val { font-family: var(--font-mono); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--fg-0); }
.offer-card .rate-strip .val small { font-size: 13px; color: var(--fg-2); font-weight: 400; margin-left: 4px; }
.offer-card .otags { display: flex; gap: 6px; flex-wrap: wrap; }
.offer-card .ofoot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 2px;
  gap: 10px;
  flex-wrap: wrap;
}
.offer-card .external-link {
  font-size: 12px;
  color: var(--accent);
  display: inline-flex; align-items: center; gap: 6px;
  transition: gap 0.18s ease;
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}
.offer-card .external-link:hover { gap: 10px; }

.offer-card .ticker-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.offer-card .ticker {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--fg-0);
}
.offer-card .change-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 99px;
  font-weight: 500;
}
.offer-card .change-badge.up { background: rgba(111,207,151,0.12); color: var(--ok); }
.offer-card .change-badge.down { background: rgba(224,122,122,0.12); color: var(--bad); }
.offer-card .change-badge.flat { background: rgba(255,255,255,0.04); color: var(--fg-2); }

.instr-card.clickable { cursor: pointer; }
.instr-card.clickable .name { transition: color 0.15s ease; }
.instr-card.clickable:hover .name { color: var(--accent); }

/* ============================================================
   PAGE HEAD
============================================================ */
.page-head {
  max-width: 1280px;
  margin: 0 auto;
  padding: 44px 32px 24px;
  position: relative;
}
.page-head-left { flex: 1; min-width: 0; }
.page-head .mesh {
  position: absolute;
  inset: -20% 0 -50%;
  z-index: -1;
  pointer-events: none;
  filter: blur(80px);
  opacity: 0.28;
}
.page-head .mesh::before {
  content: "";
  position: absolute;
  top: 0; right: 5%;
  width: 36vw; height: 36vw;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent) 0%, transparent 65%);
}
.page-head .mesh::after {
  content: "";
  position: absolute;
  top: 30%; left: 10%;
  width: 26vw; height: 26vw;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-deep) 0%, transparent 70%);
}
.page-head .eyebrow { margin-bottom: 12px; }
.page-head h1 { max-width: 100%; }
.page-head h1 em { font-style: normal; color: var(--accent); }

.live-stats {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
  row-gap: 8px;
}
.live-stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 0 18px;
  border-left: 1px solid var(--line);
  min-width: 0;
  white-space: nowrap;
}
.live-stat:first-child {
  padding-left: 0;
  border-left: none;
}
.live-stat .k {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.live-stat .v {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--fg-0);
  transition: color 0.25s ease;
}
.live-stat .v.empty { color: var(--fg-3); }
.live-stat .v .acc { color: var(--accent); }

/* ============================================================
   FILTER BAR
============================================================ */
.section {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px 32px;
}

.filter-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  padding: 14px;
  border-radius: var(--radius-md);
  background: var(--card-bg);
  border: var(--card-border);
  backdrop-filter: var(--card-backdrop);
  -webkit-backdrop-filter: var(--card-backdrop);
}
.search {
  flex: 1;
  min-width: 240px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  transition: border-color 0.15s ease;
}
.search:focus-within { border-color: var(--accent); }
.search svg { width: 16px; height: 16px; color: var(--fg-2); flex-shrink: 0; }
.search input { flex: 1; background: none; border: none; outline: none; font-size: 14px; }
.search input::placeholder { color: var(--fg-3); }

.filter {
  position: relative;
}
.filter select {
  appearance: none;
  -webkit-appearance: none;
  padding: 10px 36px 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  font-size: 13px;
  cursor: pointer;
  color: var(--fg-0);
  font-family: var(--font-sans);
  letter-spacing: -0.005em;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.filter select:hover { background: rgba(255,255,255,0.06); border-color: var(--line-2); }
.filter select:focus { outline: none; border-color: var(--accent); }
.filter::after {
  content: "";
  position: absolute;
  right: 14px; top: 50%;
  margin-top: -4px;
  width: 6px; height: 6px;
  border-right: 1.5px solid var(--fg-2);
  border-bottom: 1.5px solid var(--fg-2);
  transform: rotate(45deg);
  pointer-events: none;
}
/* Dropdown options — fix the white-background bug */
.filter select option {
  background: var(--bg-2);
  color: var(--fg-0);
  padding: 8px;
}

/* Sort gets an accent-tinted look */
.filter.sort select {
  background: rgba(217,184,113,0.06);
  border-color: rgba(217,184,113,0.25);
  color: var(--fg-0);
  font-weight: 500;
  padding-left: 38px;
}
.filter.sort::before {
  content: "";
  position: absolute;
  left: 14px; top: 50%;
  width: 14px; height: 14px;
  margin-top: -7px;
  background: currentColor;
  color: var(--accent);
  pointer-events: none;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 6h13M3 12h9M3 18h5M17 18l4-4M17 18V4'/></svg>") center/contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 6h13M3 12h9M3 18h5M17 18l4-4M17 18V4'/></svg>") center/contain no-repeat;
}
.filter.sort select:hover { background: rgba(217,184,113,0.1); }
.filter.sort::after { color: var(--accent); border-color: var(--accent); }

.dir-counts {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
  padding: 0 6px;
  white-space: nowrap;
}

/* ============================================================
   TOGGLE PILLS ROW
============================================================ */
.toggles {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-top: 18px;
  padding: 18px 4px 0;
  border-top: 1px solid var(--line);
}
.toggle-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toggle-group .lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-2);
  padding-left: 4px;
}
.toggle-pills {
  display: inline-flex;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--line);
  border-radius: 99px;
  padding: 3px;
}
.toggle-pills button {
  padding: 8px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-1);
  transition: all 0.15s ease;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.toggle-pills button:hover { color: var(--fg-0); }
.toggle-pills button[aria-pressed="true"] {
  background: var(--accent);
  color: var(--bg-0);
  font-weight: 600;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
}

/* ============================================================
   CATALOG GRID
============================================================ */
.catalog-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 14px 0 10px;
  gap: 16px;
  flex-wrap: wrap;
  min-height: 18px;
}
.catalog-meta h2 {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.catalog-meta h2 .num-acc { color: var(--accent); }
.active-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.active-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--font-mono);
  padding: 4px 10px;
  border-radius: 99px;
  background: rgba(217,184,113,0.10);
  color: var(--accent);
  letter-spacing: 0.02em;
}
.active-chip .x { color: var(--accent); opacity: 0.7; cursor: pointer; }
.active-chip .x:hover { opacity: 1; }
.clear-all {
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-2);
  padding: 4px 8px;
}
.clear-all:hover { color: var(--fg-0); }

.instr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card-bg);
  border: var(--card-border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--card-shadow);
  backdrop-filter: var(--card-backdrop);
  -webkit-backdrop-filter: var(--card-backdrop);
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.card.interactive:hover {
  transform: translateY(-2px);
  border-color: rgba(217,184,113,0.35);
  box-shadow: var(--card-shadow), 0 20px 50px -25px var(--accent-glow);
}

.instr-card { display: flex; flex-direction: column; gap: 14px; }
.instr-card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.instr-card .name { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
.instr-card .sub { font-size: 11px; color: var(--fg-2); margin-top: 4px; font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase; }

.badges { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 10.5px;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap;
}
.badge.risk-low { background: rgba(111,207,151,0.10); color: var(--ok); }
.badge.risk-mid { background: rgba(232,199,126,0.10); color: var(--warn); }
.badge.risk-hi  { background: rgba(224,122,122,0.10); color: var(--bad); }
.badge.online   { background: rgba(217,184,113,0.10); color: var(--accent); }
.badge.offline  { background: rgba(255,255,255,0.04); color: var(--fg-2); }

.instr-card .ret-strip {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(217,184,113,0.10), rgba(217,184,113,0.02));
  border: 1px solid rgba(217,184,113,0.15);
}
.instr-card .ret-strip .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.instr-card .ret-strip .val { font-family: var(--font-mono); font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }

.metrics {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 8px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.metric { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.metric .k { font-size: 9.5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.metric .v { font-size: 13px; font-family: var(--font-mono); color: var(--fg-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  color: var(--fg-1);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

.proscons { display: flex; flex-direction: column; gap: 6px; font-size: 13px; padding-top: 4px; }
.proscons .ln { display: flex; gap: 10px; color: var(--fg-1); align-items: flex-start; line-height: 1.45; }
.proscons .ln::before {
  content: "+"; flex-shrink: 0;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--accent); width: 12px; text-align: center;
  margin-top: 1px;
}
.proscons .ln.con::before { content: "−"; color: var(--fg-3); }

.instr-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.link {
  font-size: 13px;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: gap 0.18s ease;
  font-weight: 500;
}
.link:hover { gap: 10px; }
.complexity-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--fg-2);
  font-family: var(--font-mono); letter-spacing: 0.04em;
}
.complexity-pill .dots { display: inline-flex; gap: 2px; }
.complexity-pill .dots i {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--fg-3);
}
.complexity-pill .dots i.on { background: var(--accent); }

/* empty state */
.empty {
  padding: 64px 32px;
  text-align: center;
  border-radius: var(--radius-lg);
  border: 1px dashed var(--line-2);
  color: var(--fg-2);
  grid-column: 1 / -1;
}
.empty h3 { color: var(--fg-1); margin-bottom: 8px; font-weight: 500; }

/* ============================================================
   DISCLAIMER + FOOTER
============================================================ */
.footer {
  padding: 32px 32px 40px;
  border-top: 1px solid var(--line);
  margin-top: 64px;
}
.footer-inner {
  max-width: 1280px;
  margin: 0 auto;
}
.disclaimer-card {
  padding: 24px 28px;
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: rgba(217,184,113,0.04);
  display: flex;
  gap: 18px;
  margin-bottom: 32px;
}
.disclaimer-card .ic {
  width: 36px; height: 36px; flex-shrink: 0;
  border-radius: 10px;
  background: rgba(217,184,113,0.12);
  color: var(--accent);
  display: grid; place-items: center;
  font-weight: 600; font-size: 16px;
}
.disclaimer-card h4 { margin-bottom: 6px; font-size: 14px; }
.disclaimer-card p { color: var(--fg-1); font-size: 13px; line-height: 1.55; max-width: 820px; }

.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.04em;
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width: 720px) {
  .sticky-area { position: relative; }
  .topbar { padding: 12px 18px; }
  .page-head { padding: 28px 18px 14px; }
  .section { padding: 0 18px 24px; }
  .filter-bar { padding: 12px; }
  .filter select { width: 100%; }
  .filter { flex: 1; min-width: calc(50% - 6px); }
  .toggles { gap: 16px; }
  .live-stats-row { padding: 12px; margin-top: 10px; }
  .live-stat { padding: 0 12px; }
  .live-stat .v { font-size: 13px; }
  .live-stat .k { font-size: 10px; }
  .footer { padding: 24px 18px 32px; }
  .disclaimer-card { padding: 18px 20px; }
  .instr-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="sticky-area">
  <header class="topbar">
    <div class="brand" id="brand">
      <div class="mark"></div>
      <div class="wordmark">Invest<span>·</span>Navigator</div>
    </div>
    <div class="nav-title" id="nav-title" hidden></div>
    <div class="topbar-right">
      <div class="lang-switch" id="lang-switch">
        <button data-lang="uz" aria-pressed="true">UZ</button>
        <button data-lang="ru">RU</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <section class="page-head" id="page-head-section" hidden>
    <div class="mesh" aria-hidden="true"></div>
    <div class="page-head-left">
      <button class="back-link" id="back-link" hidden></button>
      <h1 id="page-title"></h1>
    </div>
  </section>

  <section class="section pinned-filters">
    <div class="filter-bar" id="filter-bar">
      <!-- dynamically populated per route -->
    </div>

    <div class="live-stats-row">
      <div class="live-stats" id="live-stats"></div>
      <div class="live-stats-actions">
        <div class="active-filters" id="active-filters"></div>
        <button class="clear-all" id="clear-all" data-t="catalog.clear"></button>
      </div>
    </div>
  </section>
</div>

<section class="section" style="padding-top: 20px">
  <div class="instr-grid" id="dir-grid"></div>
</section>

<footer class="footer">
  <div class="footer-inner">
    <div class="disclaimer-card">
      <div class="ic">!</div>
      <div>
        <h4 data-t="disclaimer.title"></h4>
        <p data-t="disclaimer.body"></p>
      </div>
    </div>
    <div class="footer-bottom">
      <span data-t="footer.note"></span>
      <span data-t="footer.version"></span>
    </div>
  </div>
</footer>

<script src="offers.js"></script>
<script src="app.js"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
